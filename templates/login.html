<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>灵兔洞察系统 - 登录</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --primary-color: #1587e6;
      --primary-dark: #0a5fab;
      --bg-dark: #dce3eb;
      --bg-card: rgba(255, 255, 255, 0.58);
      --border-color: rgba(134, 199, 245, 0.34);
      --text-primary: #0b2d48;
      --text-secondary: #46677f;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background:
        radial-gradient(circle at 18% 18%, rgba(100, 194, 255, 0.34), transparent 28%),
        radial-gradient(circle at 82% 22%, rgba(214, 241, 255, 0.78), transparent 32%),
        radial-gradient(circle at 50% 90%, rgba(88, 157, 220, 0.18), transparent 36%),
        linear-gradient(135deg, #eef8ff 0%, #dcefff 42%, #f9fdff 100%);
      background-size: 200% 200%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(16px, 4vw, 32px);
      position: relative;
      overflow: hidden;
      overflow-x: hidden;
      animation: gradientShift 15s ease infinite;
    }
    
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background:
        linear-gradient(115deg, rgba(255,255,255,0.34), transparent 30%, rgba(112,190,246,0.14) 62%, transparent),
        radial-gradient(circle at 28% 24%, rgba(255, 255, 255, 0.88) 0%, transparent 22%),
        radial-gradient(circle at 74% 76%, rgba(37, 137, 214, 0.16) 0%, transparent 34%);
      animation: pulseOverlay 8s ease-in-out infinite;
    }
    
    @keyframes pulseOverlay {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.8; }
    }
    
    .grid-bg {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image:
        linear-gradient(rgba(33, 142, 219, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(33, 142, 219, 0.055) 1px, transparent 1px);
      background-size: 45px 45px;
      animation: gridMove 30s linear infinite;
    }
    
    @keyframes gridMove {
      from { background-position: 0 0; }
      to { background-position: 45px 45px; }
    }
    
    .login-container {
      position: relative;
      z-index: 10;
      background: linear-gradient(145deg, rgba(255,255,255,0.72), rgba(237,248,255,0.48));
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border: 1px solid rgba(255,255,255,0.72);
      border-radius: 18px;
      padding: clamp(24px, 4vw, 34px);
      width: min(100%, 392px);
      max-width: 392px;
      box-shadow:
        0 24px 70px rgba(38, 119, 184, 0.18),
        0 8px 22px rgba(18, 83, 137, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.88);
      overflow: hidden;
    }
    
    .logo-section {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 14px;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 14px 30px rgba(35, 137, 216, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.72);
      background: rgba(255,255,255,0.54);
    }
    
    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: auto;
      -ms-interpolation-mode: bicubic;
    }
    
    .title {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: 0.5px;
    }
    
    .subtitle {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 5px;
    }
    
    .form-group {
      margin-bottom: 18px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 7px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
    }
    
    .form-group input {
      width: 100%;
      padding: 13px 15px;
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      font-size: 14px;
      color: var(--text-primary);
      transition: all 0.25s;
      outline: none;
    }
    
    .form-group input:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.12);
      background: rgba(255, 255, 255, 0.9);
    }
    
    .form-group input::placeholder {
      color: rgba(0, 0, 0, 0.4);
    }
    
    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
      color: white;
      box-shadow: 0 2px 8px rgba(0, 122, 255, 0.3);
    }
    
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(0, 122, 255, 0.4);
    }
    
    .btn-primary:active {
      transform: translateY(0);
    }
    
    .error-message {
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #dc2626;
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 18px;
      display: none;
    }
    
    .error-message.show {
      display: block;
    }
    
    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 11px;
      color: rgba(0, 0, 0, 0.3);
    }
    
    .captcha-group {
      margin-bottom: 18px;
    }
    
    .captcha-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 128px;
      gap: 10px;
      align-items: center;
    }
    
    @supports not (gap: 10px) {
      .captcha-row > * + * { margin-left: 10px; }
    }
    
    .captcha-row input {
      min-width: 0;
      width: 100%;
    }
    
    .captcha-image {
      width: 128px;
      height: 48px;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid rgba(96, 174, 231, 0.32);
      object-fit: contain;
      image-rendering: auto;
      -ms-interpolation-mode: bicubic;
      transition: all 0.2s;
      background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(229,246,255,0.86));
    }
    
    .captcha-image:hover {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.12);
    }
    
    .captcha-tip {
      display: block;
      font-size: 11px;
      color: rgba(0, 0, 0, 0.4);
      margin-top: 6px;
    }
    
    .glow-effect {
      position: absolute;
      top: -100%;
      left: -100%;
      width: 300%;
      height: 300%;
      background: radial-gradient(circle, rgba(91, 178, 242, 0.12) 0%, transparent 58%);
      pointer-events: none;
      animation: rotate 30s linear infinite;
    }
    
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Login responsive polish */
    .login-container::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background: linear-gradient(135deg, rgba(255,255,255,0.82), transparent 36%, rgba(92,177,239,0.12));
      mask-image: linear-gradient(#000, transparent 82%);
    }

    .login-container > * {
      position: relative;
      z-index: 1;
    }

    @media (max-width: 430px) {
      body { padding: 14px; align-items: flex-start; overflow-y: auto; }
      .login-container { padding: 22px 18px; margin-top: 3vh; }
      .captcha-row { grid-template-columns: 1fr; }
      .captcha-image { width: 100%; max-width: 150px; justify-self: end; }
      .logo-section { margin-bottom: 22px; }
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  
  <div class="login-container">
    <div class="glow-effect"></div>
    
    <div class="logo-section">
      <div class="logo">
        <img src="/static/images/logo.png?v=1" alt="灵兔洞察系统">
      </div>
      <div class="title">灵兔洞察系统</div>
      <div class="subtitle">Lingtu Insight System</div>
    </div>
    
    <div class="error-message" id="error-message"></div>
    
    <form id="login-form">
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" name="username" placeholder="请输入用户名" required>
      </div>
      
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" name="password" placeholder="请输入密码" required>
      </div>
      
      <div class="form-group captcha-group">
        <label for="captcha">验证码</label>
        <div class="captcha-row">
          <input type="text" id="captcha" name="captcha" placeholder="请输入验证码" required maxlength="4">
          <img id="captcha-img" src="/api/captcha" alt="验证码" class="captcha-image" onclick="refreshCaptcha()">
        </div>
        <span class="captcha-tip">点击图片刷新验证码</span>
      </div>
      
      <button type="submit" class="btn btn-primary">登录</button>
    </form>
    
    <div class="footer">
      © 2026 Lingtu Insight System
    </div>
  </div>

  <script>
    function refreshCaptcha() {
      var img = document.getElementById('captcha-img');
      img.src = '/api/captcha?' + Date.now();
      document.getElementById('captcha').value = '';
    }
    
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      var username = document.getElementById('username').value;
      var password = document.getElementById('password').value;
      var captcha = document.getElementById('captcha').value;
      var errorDiv = document.getElementById('error-message');
      
      errorDiv.classList.remove('show');
      
      fetch('/api/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ username: username, password: password, captcha: captcha })
      })
      .then(function(response) {
        return response.json();
      })
      .then(function(result) {
        if (result.success) {
          window.location.href = '/';
        } else {
          errorDiv.textContent = result.message || '登录失败';
          errorDiv.classList.add('show');
          refreshCaptcha();
        }
      })
      .catch(function(error) {
        errorDiv.textContent = '网络错误，请稍后重试';
        errorDiv.classList.add('show');
      });
    });
  </script>
</body>
</html>
