{% extends "base.html" %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">巡检配置单</h1>
  <p class="page-subtitle">批量检查服务器状态，生成巡检报告</p>
</div>

<div class="inspect-container">
  <!-- 巡检配置 -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon">⚙️</div>
      <h3 class="card-title">巡检配置</h3>
    </div>
    
    <div class="card-body">
    <div class="inspect-section">
      <div class="inspect-section-title">
        <span class="inspect-section-icon">📋</span>
        基本信息
      </div>
      <div class="inspect-section-body">
        <div class="inspect-form-group">
          <label class="inspect-form-label">
            任务名称
            <span class="inspect-form-label-hint">用于保存任务时的标识名称</span>
          </label>
          <input type="text" id="taskName" class="inspect-form-control" placeholder="例如：日常巡检任务">
        </div>
        <div class="inspect-form-group">
          <label class="inspect-form-label">
            项目名称
            <span class="inspect-form-label-hint">用于报告命名</span>
          </label>
          <input type="text" id="projectName" class="inspect-form-control" placeholder="例如：XX数据中心日常巡检">
        </div>
        <div class="inspect-form-group">
          <label class="inspect-form-label">
            巡检人
            <span class="inspect-form-label-hint">报告中的签字人</span>
          </label>
          <input type="text" id="inspector" class="inspect-form-control" placeholder="例如：张三">
        </div>
      </div>
    </div>
    
    <div class="inspect-section">
      <div class="inspect-section-title">
        <span class="inspect-section-icon">�</span>
        报告格式
      </div>
      <div class="inspect-section-body">
        <div class="inspect-form-group">
          <label class="inspect-form-label">选择输出格式</label>
          <div class="inspect-format-options">
            <label class="inspect-format-option">
              <input type="radio" name="reportFormat" id="formatExcel" value="excel" checked>
              <span class="inspect-format-content">
                <span class="inspect-format-icon">📊</span>
                <span class="inspect-format-text">Excel</span>
                <span class="inspect-format-check" aria-hidden="true">✓</span>
              </span>
            </label>
            <label class="inspect-format-option">
              <input type="radio" name="reportFormat" id="formatPdf" value="pdf">
              <span class="inspect-format-content">
                <span class="inspect-format-icon">📄</span>
                <span class="inspect-format-text">PDF</span>
                <span class="inspect-format-check" aria-hidden="true">✓</span>
              </span>
            </label>
          </div>
        </div>
      </div>
    </div>
    
    <div class="inspect-section">
      <div class="inspect-section-title">
        <span class="inspect-section-icon">💻</span>
        资源巡检
      </div>
      <div class="inspect-section-body">
        <div class="inspect-form-group">
          <label class="inspect-form-label">
            服务器分组
            <span class="inspect-form-label-hint">选择要进行资源巡检的服务器分组</span>
          </label>
          <select id="resourceGroup" class="inspect-form-select">
            <option value="">全部服务器</option>
            {% for g in groups %}
            <option value="{{g.id}}">{{g.name}}</option>
            {% endfor %}
          </select>
        </div>
        <div class="inspect-form-group">
          <label class="inspect-form-label">
            巡检项
            <span class="inspect-form-label-hint">选择要检查的资源项</span>
          </label>
          <div class="inspect-checkbox-group">
            <label class="inspect-checkbox-item">
              <input type="checkbox" id="checkCpu" checked>
              <span>CPU</span>
            </label>
            <label class="inspect-checkbox-item">
              <input type="checkbox" id="checkMem" checked>
              <span>内存</span>
            </label>
            <label class="inspect-checkbox-item">
              <input type="checkbox" id="checkDisk" checked>
              <span>磁盘</span>
            </label>
          </div>
        </div>
        <div class="inspect-alert">
          <strong>告警阈值</strong><br>
          CPU ≥ {{cpu}}% / 内存 ≥ {{mem}}% / 磁盘 ≥ {{disk}}%<br>
          超过阈值将计入异常问题描述
        </div>
      </div>
    </div>
    
    <div class="inspect-section">
      <div class="inspect-section-title">
        <span class="inspect-section-icon">🔌</span>
        网关代理检测
        <label class="inspect-switch">
          <input type="checkbox" id="enableProxyCheck">
          <span class="inspect-switch-slider"></span>
        </label>
      </div>
      <div id="proxyConfig" style="display: none;">
        <button type="button" id="addProxyRule" class="inspect-btn inspect-btn-primary" style="padding: 0.375rem 0.875rem; font-size: 0.8125rem; margin-bottom: 0.75rem;">
          + 添加规则
        </button>
        <div id="proxyRulesList">
          <div class="inspect-proxy-rule-row" data-index="0">
            <div class="inspect-proxy-rule-item">
              <label class="inspect-proxy-label">服务器</label>
              <select class="inspect-proxy-select proxy-group-select">
                <option value="">全部</option>
                {% for g in groups %}
                <option value="{{g.id}}">{{g.name}}</option>
                {% endfor %}
              </select>
            </div>
            <div class="inspect-proxy-rule-item inspect-proxy-rule-item-large">
              <label class="inspect-proxy-label">CURL命令</label>
              <input type="text" class="inspect-proxy-input proxy-curl-command" placeholder='curl -s http://127.0.0.1:8080/api/health'>
            </div>
            <div class="inspect-proxy-rule-item">
              <label class="inspect-proxy-label">关键词</label>
              <input type="text" class="inspect-proxy-input-short proxy-success-keyword" value="成功" placeholder="成功">
            </div>
            <button type="button" class="inspect-btn inspect-btn-delete remove-proxy-rule" style="display: inline-flex;">
              删除
            </button>
          </div>
        </div>
      </div>
    </div>
    
    <div class="inspect-section">
      <div class="inspect-section-title">
        <span class="inspect-section-icon">⏰</span>
        定时巡检
        <label class="inspect-switch">
          <input type="checkbox" id="enableSchedule">
          <span class="inspect-switch-slider"></span>
        </label>
      </div>
      <div id="scheduleConfig" style="display: none;">
        <div class="inspect-form-group">
          <label class="inspect-form-label">执行时间</label>
          <input type="time" id="scheduleTime" class="inspect-form-control">
        </div>
      </div>
    </div>
    
    <div class="inspect-btn-group">
      <button id="btnStart" class="inspect-btn inspect-btn-primary">
        <span class="inspect-btn-icon">▶️</span>
        开始巡检
      </button>
      <button id="btnSaveTask" class="inspect-btn inspect-btn-secondary">
        <span class="inspect-btn-icon">💾</span>
        保存任务
      </button>
    </div>
    </div>
  </div>
  
  <!-- 巡检进度 -->
  <div id="progressCard" class="card mt-4" style="display: none;">
    <div class="card-header">
      <div class="card-icon">📊</div>
      <h3 class="card-title">巡检进度</h3>
    </div>
    
    <div class="card-body">
    
    <div class="progress-container">
      <div class="progress-info">
        <span class="progress-label">当前进度</span>
        <span id="progressPercent" class="progress-percent">0%</span>
      </div>
      <div class="progress">
        <div id="progressBar" class="progress-bar" style="width: 0%"></div>
      </div>
    </div>
    
    <div class="form-section">
      <div class="form-section-title">执行日志</div>
      <pre id="logBox" class="log-box"></pre>
    </div>
    
    <div id="downloadBox" class="mt-3"></div>
    </div>
  </div>
</div>
{% endblock %}
